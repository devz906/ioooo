name: Build Titan-MeloNX IPA
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          submodules: recursive 

      - name: Select Best Xcode
        run: |
          XCODE_PATH=$(ls -d /Applications/Xcode_*.app | sort -V | tail -n 1)
          if [ -z "$XCODE_PATH" ]; then XCODE_PATH="/Applications/Xcode.app"; fi
          sudo xcode-select -s "$XCODE_PATH/Contents/Developer"

      - name: Locate and Build Project
        run: |
          # Look for the project file anywhere in the repo
          PROJ_PATH=$(find . -name "*.xcodeproj" -print -quit)
          
          if [ -z "$PROJ_PATH" ]; then
            echo "❌ ERROR: No .xcodeproj found! Check if your MeloNX folder is pushed correctly."
            ls -R # This will print your whole file tree to the log so we can see what's wrong
            exit 1
          fi
          
          echo "✅ Found project at: $PROJ_PATH"
          
          xcodebuild -project "$PROJ_PATH" \
                     -scheme MeloNX \
                     -configuration Release \
                     -sdk iphoneos \
                     -derivedDataPath build \
                     CODE_SIGN_IDENTITY="" \
                     CODE_SIGNING_REQUIRED=NO \
                     CODE_SIGNING_ALLOWED=NO \
                     AD_HOC_CODE_SIGNING_ALLOWED=YES

      - name: Package IPA
        run: |
          mkdir -p Payload
          # Find the .app file inside the build folder
          APP_FOLDER=$(find build/Build/Products/Release-iphoneos -name "*.app" -type d | head -n 1)
          cp -r "$APP_FOLDER" Payload/
          zip -r Titan-MeloNX.ipa Payload
          
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Titan-MeloNX-IPA
          path: Titan-MeloNX.ipa
