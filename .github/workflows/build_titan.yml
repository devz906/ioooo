name: Build Titan-MeloNX IPA
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          submodules: recursive # Crucial for MeloNX emulator cores

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_15.4.app

      - name: Build MeloNX Binary
        run: |
          # Finds the project automatically and builds for iOS
          xcodebuild -project *.xcodeproj \
                     -scheme MeloNX \
                     -configuration Release \
                     -sdk iphoneos \
                     -derivedDataPath build \
                     CODE_SIGN_IDENTITY="" \
                     CODE_SIGNING_REQUIRED=NO \
                     CODE_SIGNING_ALLOWED=NO \
                     AD_HOC_CODE_SIGNING_ALLOWED=YES

      - name: Package IPA for Titan
        run: |
          mkdir -p Payload
          # Move the compiled .app into the Payload folder
          cp -r build/Build/Products/Release-iphoneos/*.app Payload/
          zip -r Titan-MeloNX.ipa Payload
          
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Titan-MeloNX-IPA
          path: Titan-MeloNX.ipa
