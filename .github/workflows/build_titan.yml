name: Build Titan-MeloNX IPA
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          submodules: recursive 

      - name: Select Best Xcode
        run: |
          XCODE_PATH=$(ls -d /Applications/Xcode_*.app | sort -V | tail -n 1)
          if [ -z "$XCODE_PATH" ]; then XCODE_PATH="/Applications/Xcode.app"; fi
          sudo xcode-select -s "$XCODE_PATH/Contents/Developer"

      - name: Build Titan-MeloNX
        run: |
          # 1. Look for the Project file
          PROJ_PATH=$(find . -name "*.xcodeproj" -print -quit)
          
          if [ -n "$PROJ_PATH" ]; then
            echo "✅ Found project at: $PROJ_PATH"
            xcodebuild -project "$PROJ_PATH" \
                       -scheme MeloNX \
                       -configuration Release \
                       -sdk iphoneos \
                       -derivedDataPath build \
                       CODE_SIGN_IDENTITY="" \
                       CODE_SIGNING_REQUIRED=NO \
                       CODE_SIGNING_ALLOWED=NO
          else
            echo "❌ No .xcodeproj found. Attempting to locate Source folder..."
            # Look for the folder containing MeloNX source
            SOURCE_DIR=$(find . -name "MeloNX" -type d -maxdepth 2 | head -n 1)
            echo "Building from source directory: $SOURCE_DIR"
            
            # If there's no project, we might need to check if it's a CMake project
            if [ -f "CMakeLists.txt" ]; then
               mkdir build && cd build
               cmake .. -G Xcode
               PROJ_PATH=$(find . -name "*.xcodeproj" -print -quit)
               xcodebuild -project "$PROJ_PATH" -scheme MeloNX -configuration Release -sdk iphoneos
            else
               echo "FATAL: No build system (Xcode or CMake) detected."
               ls -R
               exit 1
            fi
          fi

      - name: Package IPA
        run: |
          mkdir -p Payload
          APP_FOLDER=$(find build -name "*.app" -type d | head -n 1)
          if [ -z "$APP_FOLDER" ]; then echo "Build failed, no .app found"; exit 1; fi
          cp -r "$APP_FOLDER" Payload/
          zip -r Titan-MeloNX.ipa Payload
          
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Titan-MeloNX-IPA
          path: Titan-MeloNX.ipa
